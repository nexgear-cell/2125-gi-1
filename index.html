<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NUR2125 · GI PPNP Quiz</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #eef3f8;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px 16px;
        }
        .app-wrapper {
            max-width: 900px;
            width: 100%;
        }
        header {
            background: linear-gradient(145deg, #0b2b40, #15475f);
            color: white;
            padding: 28px 30px;
            border-radius: 40px 40px 40px 40px;
            margin-bottom: 32px;
            box-shadow: 0 15px 25px -8px rgba(0,40,60,0.3);
            border: 1px solid #2b6a8c;
        }
        header h1 {
            margin: 0 0 8px 0;
            font-weight: 600;
            font-size: 2.2rem;
            letter-spacing: -0.02em;
        }
        header p {
            margin: 0 0 12px 0;
            color: #c2def5;
            font-size: 1.1rem;
        }
        .part-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            background: #1c506e;
            padding: 12px 18px;
            border-radius: 50px;
            margin-top: 12px;
        }
        .part-btn {
            background: transparent;
            border: 1px solid #4794b9;
            color: white;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.15s;
        }
        .part-btn.active {
            background: white;
            color: #0b2b40;
            border-color: white;
        }
        .part-btn:hover {
            background: #347a9e;
            border-color: #a3d0e8;
        }
        .score-panel {
            background: white;
            border-radius: 60px;
            padding: 14px 28px;
            margin: 25px 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 5px 12px rgba(0,0,0,0.04);
            border: 1px solid #c7ddec;
        }
        .score-badge {
            background: #0b2b40;
            color: white;
            font-weight: 600;
            padding: 6px 24px;
            border-radius: 40px;
            letter-spacing: 0.3px;
        }
        .q-container {
            background: white;
            border-radius: 36px;
            padding: 30px 32px;
            box-shadow: 0 12px 28px rgba(0, 25, 45, 0.08);
            border: 1px solid #d6e4f0;
        }
        .q-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        .q-num {
            background: #dbeaf5;
            color: #103d57;
            font-weight: 700;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 1rem;
        }
        .part-tag {
            background: #ced9e8;
            color: #1f4662;
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: 500;
        }
        .q-text {
            font-size: 1.35rem;
            font-weight: 500;
            line-height: 1.5;
            color: #05212e;
            margin: 20px 0 30px;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin: 30px 0 25px;
        }
        .option-item {
            display: flex;
            align-items: center;
            gap: 20px;
            background: #f6fafd;
            border: 2px solid #d9e6f2;
            border-radius: 28px;
            padding: 18px 28px;
            cursor: pointer;
            transition: all 0.1s;
        }
        .option-item.selected {
            border-color: #1e6e9c;
            background: #e1f0fa;
        }
        .option-letter {
            width: 46px;
            height: 46px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.4rem;
            color: #0b2b40;
            border: 1px solid #b7cfdf;
        }
        .option-text {
            font-size: 1.1rem;
            color: #1a384b;
            flex: 1;
        }
        .answer-panel {
            background: #ecf6fe;
            border-radius: 26px;
            padding: 24px 30px;
            margin: 24px 0 16px;
            border-left: 6px solid #116b99;
        }
        .correct-badge {
            background: #117a4b;
            color: white;
            font-weight: 600;
            padding: 6px 22px;
            border-radius: 40px;
            display: inline-block;
            margin-bottom: 15px;
        }
        .rationale {
            font-size: 1.05rem;
            color: #023047;
            margin: 12px 0;
            line-height: 1.6;
        }
        .source {
            background: #ddeeff;
            padding: 12px 22px;
            border-radius: 40px;
            color: #1d5472;
            display: inline-block;
            font-size: 0.95rem;
        }
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 30px 0 15px;
        }
        .nav-btn {
            background: white;
            border: 1.5px solid #b9cfdf;
            padding: 14px 30px;
            border-radius: 50px;
            font-weight: 600;
            color: #1c4e6e;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.1s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.02);
        }
        .nav-btn:hover:not(:disabled) {
            background: #e5f0f9;
            border-color: #6f9fbf;
        }
        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .index-indicator {
            font-weight: 600;
            color: #1e5d80;
            background: #eaf3fb;
            padding: 8px 24px;
            border-radius: 40px;
        }
        .clear-btn {
            background: none;
            border: 1px solid #bbd1e0;
            padding: 10px 24px;
            border-radius: 40px;
            color: #2b4f69;
            font-weight: 500;
            cursor: pointer;
            transition: 0.1s;
        }
        .clear-btn:hover {
            background: #f0f6fd;
        }
        footer {
            text-align: center;
            margin-top: 30px;
            color: #6c8aa3;
            font-size: 0.9rem;
        }
        .loader {
            text-align: center;
            padding: 70px;
            color: #326885;
            font-size: 1.3rem;
        }
    </style>
</head>
<body>
<div class="app-wrapper" id="app">
    <header>
        <h1>🧪 NUR2125 GI PPNP Quiz</h1>
        <p>one question at a time | track your score per part</p>
        <div class="part-selector">
            <button v-for="p in partList" :key="p.val" class="part-btn" :class="{active: currentPart === p.val}" @click="switchPart(p.val)">{{ p.label }}</button>
        </div>
    </header>

    <!-- loading / error -->
    <div v-if="!loaded" class="loader">⏳ loading question bank ...</div>

    <template v-else>
        <!-- Score panel for selected part -->
        <div class="score-panel" v-if="filteredQuestions.length > 0">
            <span>📊 part {{ currentPart }} score</span>
            <span class="score-badge">{{ partScore.correct }} / {{ partScore.total }} ({{ Math.round(partScore.percent) }}%)</span>
            <button class="clear-btn" @click="clearPartAnswers">clear part answers</button>
        </div>

        <!-- main question card -->
        <div class="q-container" v-if="filteredQuestions.length > 0">
            <div class="q-header">
                <span class="q-num">Q{{ currentIndex + 1 }} of {{ filteredQuestions.length }}</span>
                <span class="part-tag">part {{ currentQuestion.part }}</span>
            </div>
            <div class="q-text" v-html="currentQuestion.question"></div>

            <div class="options">
                <div v-for="opt in ['A','B','C','D']" :key="opt" class="option-item" :class="{selected: userAnswer === opt}" @click="setAnswer(opt)">
                    <span class="option-letter">{{ opt }}</span>
                    <span class="option-text" v-html="currentQuestion.options[opt]"></span>
                </div>
            </div>

            <!-- answer panel (only if answer selected) -->
            <div v-if="userAnswer" class="answer-panel">
                <div class="correct-badge">✓ correct answer: {{ currentQuestion.answer }}</div>
                <div class="rationale"><strong>Rationale:</strong> {{ currentQuestion.rationale }}</div>
                <div class="source"><span style="opacity:0.7">📘</span> {{ currentQuestion.source }}</div>
                <div style="margin-top: 15px; font-style:italic;" v-if="userAnswer === currentQuestion.answer">✅ you are correct</div>
                <div style="margin-top: 15px; font-style:italic; color:#a12a2a;" v-else>❌ your answer: {{ userAnswer }}</div>
            </div>

            <!-- navigation -->
            <div class="nav-buttons">
                <button class="nav-btn" :disabled="currentIndex === 0" @click="prevQuestion">← Previous</button>
                <span class="index-indicator">{{ currentIndex + 1 }} / {{ filteredQuestions.length }}</span>
                <button class="nav-btn" :disabled="currentIndex === filteredQuestions.length - 1" @click="nextQuestion">Next →</button>
            </div>
        </div>

        <!-- no questions in part -->
        <div v-else style="background:white; border-radius:40px; padding:60px; text-align:center; color:#466882;">
            🧫 no questions in part {{ currentPart }}.
        </div>
    </template>
    <footer>STEM NCLEX · single question mode · score per part</footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/vue@2.7.16/dist/vue.js"></script>
<script>
    new Vue({
        el: '#app',
        data: {
            allQuestions: [],
            loaded: false,
            currentPart: '1',           // default part
            currentIndex: 0,             // index within filtered list
            userAnswers: {},              // key: questionId (string) -> selected letter
        },
        computed: {
            partList() {
                // build from actual data if possible, but static list works
                return [
                    { val: '1', label: '1 Antiemetics' },
                    { val: '2', label: '2 Diarrhea' },
                    { val: '3', label: '3 Constipation' },
                    { val: '4', label: '4 Obstruction' },
                    { val: '5', label: '5 PUD' },
                    { val: '6', label: '6 Cholecystitis' },
                    { val: '7', label: '7 Hepatitis' },
                    { val: '8', label: '8 Cirrhosis' },
                    { val: '9-13', label: '9–13 Pharm' }
                ];
            },
            filteredQuestions() {
                if (!this.allQuestions.length) return [];
                return this.allQuestions.filter(q => q.part === this.currentPart);
            },
            currentQuestion() {
                if (this.filteredQuestions.length === 0) return null;
                return this.filteredQuestions[this.currentIndex];
            },
            userAnswer() {
                if (!this.currentQuestion) return null;
                return this.userAnswers[this.currentQuestion.id] || null;
            },
            partScore() {
                let total = 0;
                let correct = 0;
                this.filteredQuestions.forEach(q => {
                    const ans = this.userAnswers[q.id];
                    if (ans) {
                        total++;
                        if (ans === q.answer) correct++;
                    }
                });
                const percent = total === 0 ? 0 : (correct / total) * 100;
                return { correct, total, percent };
            }
        },
        methods: {
            setAnswer(opt) {
                if (!this.currentQuestion) return;
                // set or toggle? we'll set, but if same option -> we can unset (optional)
                if (this.userAnswers[this.currentQuestion.id] === opt) {
                    this.$delete(this.userAnswers, this.currentQuestion.id); // unselect
                } else {
                    this.$set(this.userAnswers, this.currentQuestion.id, opt);
                }
            },
            prevQuestion() {
                if (this.currentIndex > 0) this.currentIndex--;
            },
            nextQuestion() {
                if (this.currentIndex < this.filteredQuestions.length - 1) this.currentIndex++;
            },
            switchPart(partVal) {
                this.currentPart = partVal;
                this.currentIndex = 0; // reset to first question
            },
            clearPartAnswers() {
                // remove all answers for questions in current part
                this.filteredQuestions.forEach(q => {
                    if (this.userAnswers[q.id]) {
                        this.$delete(this.userAnswers, q.id);
                    }
                });
            },
            loadQuestions() {
                fetch('questions.json')
                    .then(r => {
                        if (!r.ok) throw new Error('network');
                        return r.json();
                    })
                    .then(data => {
                        this.allQuestions = data;
                        this.loaded = true;
                    })
                    .catch(err => {
                        console.error(err);
                        // fallback: show empty, but set loaded true to hide loader
                        this.loaded = true;
                    });
            }
        },
        mounted() {
            this.loadQuestions();
        }
    });
</script>
</body>
</html>
